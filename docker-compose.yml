version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: inlaw-backend
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=gpt-4o-mini
      - DATABASE_URL=sqlite:///./app.db
      - QDRANT_URL=http://qdrant:6333
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/app.db:/app/app.db
    depends_on:
      - qdrant
    networks:
      - inlaw-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: inlaw-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_BACKEND_URL=http://backend:8000
      - NODE_ENV=production
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - inlaw-network

  qdrant:
    image: qdrant/qdrant:latest
    container_name: inlaw-qdrant
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - inlaw-network
    restart: unless-stopped

volumes:
  qdrant_data:

networks:
  inlaw-network:
    driver: bridge
